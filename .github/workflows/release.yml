name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v0.0.1"
        required: true
        default: "v0.0.1"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }
          if (-not $version.StartsWith("v")) {
            $version = "v$version"
          }
          $appVersion = $version.TrimStart("v")
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Resolved release version: $version"

      - name: Stamp app version
        shell: pwsh
        run: |
          $versionFile = "LiquidMemoWidget\version.py"
          (Get-Content $versionFile) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$env:APP_VERSION`"" |
            Set-Content $versionFile
          Get-Content $versionFile | Select-String "APP_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "LiquidMemoWidget/requirements.txt"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\LiquidMemoWidget\requirements.txt
          python -m pip install pyinstaller

      # Regression gate: import/construction smoke + updater unit tests must pass
      # before we build and publish. tests/conftest.py forces Qt's offscreen
      # platform, so no QT_QPA_PLATFORM env is needed here. pytest is pinned to a
      # major version so a future release can't silently change gate semantics.
      - name: Run tests
        shell: pwsh
        run: |
          python -m pip install "pytest>=8,<9"
          python -m pytest tests -q

      - name: Build portable app
        shell: pwsh
        run: .\Build.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist\installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\installer\LiquidMemoWidget.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          $zipPath = ".\dist\LiquidMemoWidget-Portable-${env:RELEASE_VERSION}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path .\dist\LiquidMemoWidget\* -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Verify artifacts
        shell: pwsh
        run: |
          Get-ChildItem .\dist -Recurse -File |
            Where-Object { $_.Name -match '\.(exe|zip)$' } |
            Select-Object FullName, Length

      # The release body comes from this version's section in CHANGELOG.md, so every
      # release documents its changes in detail. A tag without a matching changelog
      # section fails the build on purpose. The in-app update dialog and post-update
      # changelog render this same text.
      - name: Compose release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $lines = Get-Content CHANGELOG.md -Encoding utf8
          $pattern = "^##\s+v?$([regex]::Escape($env:APP_VERSION))(\s|$)"
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $pattern) { $start = $i; break }
          }
          if ($start -lt 0) {
            throw "CHANGELOG.md has no '## v$env:APP_VERSION' section. Document the changes before tagging a release."
          }
          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^##\s') { $end = $i; break }
          }
          $section = ($lines[($start + 1)..($end - 1)] -join "`n").Trim()
          if (-not $section) {
            throw "The '## v$env:APP_VERSION' section in CHANGELOG.md is empty. Document the changes before tagging."
          }
          $body = @()
          $body += "## Liquid Memo Widget $env:RELEASE_VERSION"
          $body += ""
          $body += $section
          $body += ""
          $body += "### 下载"
          $body += "- ``LiquidMemoWidget-Setup-$env:RELEASE_VERSION.exe``：Windows 安装包（支持应用内自动更新）"
          $body += "- ``LiquidMemoWidget-Portable-$env:RELEASE_VERSION.zip``：免安装便携版"
          $body -join "`n" | Set-Content release_body.md -Encoding utf8
          Get-Content release_body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Liquid Memo Widget ${{ env.RELEASE_VERSION }}
          body_path: release_body.md
          # Appends an auto-generated "What's Changed" commit list after the body.
          generate_release_notes: true
          files: |
            dist/installer/LiquidMemoWidget-Setup-${{ env.RELEASE_VERSION }}.exe
            dist/LiquidMemoWidget-Portable-${{ env.RELEASE_VERSION }}.zip
